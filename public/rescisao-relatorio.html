<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de rescisão PJ</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #6b7280;
        --line: #d9dee7;
        --paper: #f3f4f6;
        --red: #dc2626;
        --charcoal: #171b22;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Inter, Arial, sans-serif;
      }

      .page {
        max-width: 1080px;
        margin: 24px auto;
        padding: 0 18px 30px;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 12px;
      }

      button {
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button.primary {
        border-color: var(--red);
        background: var(--red);
        color: #fff;
      }

      .sheet {
        background: #fff;
        border: 1px solid var(--line);
      }

      .report-head {
        display: grid;
        grid-template-columns: 220px 1fr 230px;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        background: var(--charcoal);
        color: #fff;
      }

      .brand { display: grid; gap: 8px; }
      .brand img {
        width: 170px;
        max-height: 48px;
        object-fit: contain;
      }

      .brand small,
      .report-head small {
        color: #cbd5e1;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      h1 {
        margin: 0;
        font-size: 23px;
      }

      .report-meta {
        display: grid;
        gap: 5px;
        justify-items: end;
        text-align: right;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        border-bottom: 1px solid var(--line);
      }

      .summary article {
        padding: 12px 14px;
        border-right: 1px solid var(--line);
      }

      .summary article:last-child { border-right: 0; }

      .summary span,
      .signature span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .summary strong {
        display: block;
        margin-top: 5px;
        font-size: 15px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 8px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 15px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px 9px;
        border-top: 1px solid var(--line);
        font-size: 12px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
        color: #374151;
        font-size: 10px;
        text-transform: uppercase;
      }

      .num {
        text-align: right;
        white-space: nowrap;
      }

      .total-row td {
        background: #f8fafc;
        font-weight: 900;
      }

      .two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0;
      }

      .two-col > section:first-child {
        border-right: 1px solid var(--line);
      }

      .signatures {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        padding: 34px 22px 22px;
      }

      .signature { display: grid; gap: 8px; }
      .signature::before {
        content: "";
        display: block;
        border-top: 1px solid #9ca3af;
      }

      .note {
        padding: 0 22px 18px;
        color: var(--muted);
        font-size: 11px;
      }

      @media print {
        body { background: #fff; }
        .page {
          max-width: none;
          margin: 0;
          padding: 0;
        }
        .toolbar { display: none; }
        .sheet { border: 0; }
        .report-head,
        th {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="toolbar">
        <button type="button" onclick="window.close()">Fechar</button>
        <button type="button" class="primary" onclick="window.print()">Imprimir / PDF</button>
      </div>
      <section id="report" class="sheet">Carregando relatório...</section>
    </main>

    <script>
      const brl = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
      const params = new URLSearchParams(window.location.search);

      function money(value) {
        return brl.format(Number(value || 0));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(value) {
        if (!value) return "";
        return new Intl.DateTimeFormat("pt-BR", { timeZone: "UTC" }).format(new Date(`${String(value).slice(0, 10)}T12:00:00Z`));
      }

      function formatDateTime(value) {
        return new Intl.DateTimeFormat("pt-BR", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(value ? new Date(value) : new Date());
      }

      function statusText(status) {
        return {
          aguardando_nf: "Aguardando NF",
          em_aprovacao: "Em aprovação",
          finalizada: "Finalizada",
          integrada_omie: "Omie integrada",
          erro_omie: "Erro Omie",
        }[status] || status || "";
      }

      async function loadReportData() {
        const key = params.get("key");
        const stored = key ? sessionStorage.getItem(key) : null;
        if (stored) return JSON.parse(stored);

        const id = Number(params.get("id"));
        if (!id) throw new Error("Rescisão não informada.");
        const response = await fetch("/api/rescisoes");
        if (!response.ok) throw new Error("Não foi possível carregar a rescisão.");
        const data = await response.json();
        const rescisao = (data.rescisoes || []).find((item) => Number(item.id) === id);
        if (!rescisao) throw new Error("Rescisão não encontrada.");
        return { rescisao, geradoEm: new Date().toISOString() };
      }

      function renderApprovals(aprovacoes = {}) {
        const aprovadores = aprovacoes.aprovadores || [];
        return `
          <table>
            <thead>
              <tr>
                <th>Aprovador</th>
                <th>E-mail</th>
                <th>Data</th>
                <th>Autenticação</th>
              </tr>
            </thead>
            <tbody>
              ${aprovadores.length ? aprovadores.map((item) => `
                <tr>
                  <td>${escapeHtml(item.nome)}</td>
                  <td>${escapeHtml(item.email)}</td>
                  <td>${escapeHtml(formatDateTime(item.aprovado_em))}</td>
                  <td><strong>${escapeHtml(item.codigo_autenticacao || "")}</strong></td>
                </tr>
              `).join("") : `<tr><td colspan="4">Sem aprovações registradas para esta versão da rescisão.</td></tr>`}
            </tbody>
          </table>
        `;
      }

      function renderReport(data) {
        const r = data.rescisao || {};
        const proventos = Number(r.valor_proporcional || 0) + Math.max(Number(r.valor_multa || 0), 0);
        const descontos = Number(r.adiantamentos_abertos || 0) + Number(r.descontos_manual || 0) + Math.abs(Math.min(Number(r.valor_multa || 0), 0));
        document.title = `Relatório rescisão PJ - ${r.razao_social || r.nome || ""}`;
        document.querySelector("#report").innerHTML = `
          <header class="report-head">
            <div class="brand">
              <img src="/assets/logo-redefrete-branco.png" alt="Redefrete" />
              <small>Redefrete Logística</small>
            </div>
            <div>
              <small>Demonstrativo de rescisão PJ</small>
              <h1>Rescisão de contrato</h1>
            </div>
            <div class="report-meta">
              <small>Data da rescisão</small>
              <strong>${escapeHtml(formatDate(r.data_rescisao))}</strong>
              <span>${escapeHtml(statusText(r.status))}</span>
            </div>
          </header>

          <section class="summary">
            <article><span>Competência</span><strong>${escapeHtml(r.competencia || "")}</strong></article>
            <article><span>Dias</span><strong>${escapeHtml(`${r.dias_trabalhados || 0}/${r.dias_mes || 0}`)}</strong></article>
            <article><span>Proventos</span><strong>${money(proventos)}</strong></article>
            <article><span>Descontos</span><strong>${money(descontos)}</strong></article>
            <article><span>Total a pagar</span><strong>${money(r.valor_total_pagar)}</strong></article>
          </section>

          <div class="section-title">
            <h2>Dados do prestador</h2>
            <span>Gerado em ${escapeHtml(formatDateTime(data.geradoEm))}</span>
          </div>
          <table>
            <tbody>
              <tr><th>Razão social</th><td>${escapeHtml(r.razao_social || "")}</td><th>Prestador</th><td>${escapeHtml(r.nome || "")}</td></tr>
              <tr><th>CPF/CNPJ</th><td>${escapeHtml([r.cpf, r.cnpj].filter(Boolean).join(" / "))}</td><th>Motivo</th><td>${escapeHtml(r.motivo || "")}</td></tr>
              <tr><th>Aviso</th><td>${escapeHtml(`${formatDate(r.data_aviso)} | ${r.aviso_dias || 0} dias | ${Number(r.aviso_cumprido || 0) ? "cumprido" : "não cumprido"}`)}</td><th>Tipo</th><td>${escapeHtml(r.tipo_rescisao === "prestador" ? "Prestador rescinde" : "Empresa rescinde")}</td></tr>
            </tbody>
          </table>

          <div class="two-col">
            <section>
              <div class="section-title"><h2>Memória de cálculo</h2></div>
              <table>
                <tbody>
                  <tr><th>R$ Contrato</th><td class="num">${money(r.salario_base)}</td></tr>
                  <tr><th>Dias trabalhados</th><td class="num">${escapeHtml(`${r.dias_trabalhados || 0}/${r.dias_mes || 0}`)}</td></tr>
                  <tr><th>Valor proporcional</th><td class="num">${money(r.valor_proporcional)}</td></tr>
                  <tr><th>Multa rescisão (${Number(r.multa_percentual || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%)</th><td class="num">${money(r.valor_multa)}</td></tr>
                  <tr><th>Adiantamentos em aberto</th><td class="num">${money(r.adiantamentos_abertos)}</td></tr>
                  <tr><th>Descontos manuais</th><td class="num">${money(r.descontos_manual)}</td></tr>
                  <tr class="total-row"><td>Total a pagar</td><td class="num">${money(r.valor_total_pagar)}</td></tr>
                </tbody>
              </table>
            </section>
            <section>
              <div class="section-title"><h2>NF e integração</h2></div>
              <table>
                <tbody>
                  <tr><th>Status NF</th><td>${escapeHtml(r.nf_status || "pendente")}</td></tr>
                  <tr><th>Número NF</th><td>${escapeHtml(r.numero_nf || "")}</td></tr>
                  <tr><th>Valor NF</th><td class="num">${money(r.valor_nf_emitida)}</td></tr>
                  <tr><th>Diferença NF</th><td class="num">${money(r.diferenca_nf)}</td></tr>
                  <tr><th>Omie</th><td>${escapeHtml(r.omie_status || "pendente")}</td></tr>
                  <tr><th>Código integração</th><td>${escapeHtml(r.omie_codigo_integracao || "")}</td></tr>
                </tbody>
              </table>
            </section>
          </div>

          <div class="section-title">
            <h2>Aprovações</h2>
            <span>${escapeHtml(r.aprovacoes?.approved ? "Fluxo completo" : "Fluxo pendente")}</span>
          </div>
          ${renderApprovals(r.aprovacoes)}

          <section class="signatures">
            <div class="signature"><span>Responsável financeiro</span></div>
            <div class="signature"><span>Conferência</span></div>
            <div class="signature"><span>Diretoria</span></div>
          </section>
          <p class="note">Relatório gerencial de rescisão PJ. A composição considera os dados registrados no sistema, NF vinculada e aprovações válidas para esta versão da rescisão.</p>
        `;
      }

      loadReportData()
        .then(renderReport)
        .catch((error) => {
          document.querySelector("#report").textContent = error.message;
        });
    </script>
  </body>
</html>

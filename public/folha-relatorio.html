<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de folha PJ</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #6b7280;
        --line: #d9dee7;
        --paper: #f3f4f6;
        --red: #dc2626;
        --charcoal: #171b22;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Inter, Arial, sans-serif;
      }

      .page {
        max-width: 1240px;
        margin: 24px auto;
        padding: 0 18px 30px;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 12px;
      }

      button {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button.primary {
        border-color: var(--red);
        background: var(--red);
        color: #fff;
      }

      .sheet {
        background: #fff;
        border: 1px solid var(--line);
      }

      .report-head {
        display: grid;
        grid-template-columns: 220px 1fr 240px;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        background: var(--charcoal);
        color: #fff;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand img {
        width: 170px;
        max-height: 48px;
        object-fit: contain;
      }

      .brand small,
      .report-head small {
        color: #cbd5e1;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .report-meta {
        display: grid;
        gap: 5px;
        justify-items: end;
        text-align: right;
      }

      .report-meta strong {
        font-size: 18px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        border-bottom: 1px solid var(--line);
      }

      .summary article {
        padding: 12px 14px;
        border-right: 1px solid var(--line);
      }

      .summary article:last-child {
        border-right: 0;
      }

      .summary span,
      .signature span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .summary strong {
        display: block;
        margin-top: 5px;
        font-size: 15px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 8px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 15px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px 8px;
        border-top: 1px solid var(--line);
        font-size: 11px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
        color: #374151;
        font-size: 10px;
        text-transform: uppercase;
      }

      td strong {
        display: block;
      }

      td small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
      }

      .num {
        text-align: right;
        white-space: nowrap;
      }

      .total-row td {
        background: #f8fafc;
        font-weight: 900;
      }

      .signatures {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        padding: 34px 22px 22px;
      }

      .signature {
        display: grid;
        gap: 8px;
      }

      .signature::before {
        content: "";
        display: block;
        border-top: 1px solid #9ca3af;
      }

      .note {
        padding: 0 22px 18px;
        color: var(--muted);
        font-size: 11px;
      }

      @media print {
        body {
          background: #fff;
        }

        .page {
          max-width: none;
          margin: 0;
          padding: 0;
        }

        .toolbar {
          display: none;
        }

        .sheet {
          border: 0;
        }

        .report-head {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        th {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="toolbar">
        <button type="button" onclick="window.close()">Fechar</button>
        <button type="button" class="primary" onclick="window.print()">Imprimir / PDF</button>
      </div>
      <section id="report" class="sheet">Carregando relatório...</section>
    </main>

    <script>
      const brl = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
      const params = new URLSearchParams(window.location.search);

      function money(value) {
        return brl.format(Number(value || 0));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDateTime(value) {
        return new Intl.DateTimeFormat("pt-BR", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(value ? new Date(value) : new Date());
      }

      function formatCompetencia(competencia) {
        const [year, month] = String(competencia || "").split("-");
        if (!year || !month) return competencia || "";
        return new Intl.DateTimeFormat("pt-BR", { month: "long", year: "numeric", timeZone: "UTC" })
          .format(new Date(Date.UTC(Number(year), Number(month) - 1, 1)));
      }

      function sum(items, field) {
        return items.reduce((total, item) => total + Number(item[field] || 0), 0);
      }

      async function loadReportData() {
        const key = params.get("key");
        const stored = key ? sessionStorage.getItem(key) : null;
        if (stored) return JSON.parse(stored);

        const competencia = params.get("competencia");
        if (!competencia) throw new Error("Competência não informada.");
        const response = await fetch(`/api/folhas/${encodeURIComponent(competencia)}`);
        if (!response.ok) throw new Error("Não foi possível carregar a folha.");
        const data = await response.json();
        return { folha: data.folha, itens: data.itens, aprovacoes: data.aprovacoes, geradoEm: new Date().toISOString() };
      }

      function renderReport(data) {
        const folha = data.folha || {};
        const itens = data.itens || [];
        const totals = {
          salario: sum(itens, "salario_contrato"),
          valorDias: sum(itens, "valor_dias"),
          adicoes: sum(itens, "adicoes"),
          bonus: sum(itens, "bonus"),
          descontos: sum(itens, "descontos_manual"),
          adiantamentos: sum(itens, "desconto_adiantamentos"),
          nfEmitida: sum(itens, "valor_nf_emitida"),
          liquido: sum(itens, "liquido_pagar"),
          diferenca: sum(itens, "diferenca_nf"),
        };
        const proventos = totals.valorDias + totals.adicoes + totals.bonus;
        const descontos = totals.descontos + totals.adiantamentos;
        const aprovacoes = data.aprovacoes || folha.aprovacoes || {};
        const aprovadores = aprovacoes.aprovadores || [];

        document.title = `Relatório folha PJ - ${folha.competencia || ""}`;
        document.querySelector("#report").innerHTML = `
          <header class="report-head">
            <div class="brand">
              <img src="/assets/logo-redefrete-branco.png" alt="Redefrete" />
              <small>Redefrete Logística</small>
            </div>
            <div>
              <small>Demonstrativo de folha PJ</small>
              <h1>Folha de pagamento</h1>
            </div>
            <div class="report-meta">
              <small>Competência</small>
              <strong>${escapeHtml(formatCompetencia(folha.competencia))}</strong>
              <span>${escapeHtml(folha.status === "fechada" ? "Fechada" : "Aberta")}</span>
            </div>
          </header>

          <section class="summary">
            <article><span>Prestadores</span><strong>${itens.length}</strong></article>
            <article><span>Salário base</span><strong>${money(totals.salario)}</strong></article>
            <article><span>Proventos</span><strong>${money(proventos)}</strong></article>
            <article><span>Descontos</span><strong>${money(descontos)}</strong></article>
            <article><span>Total líquido</span><strong>${money(totals.liquido)}</strong></article>
            <article><span>Dif. NF</span><strong>${money(totals.diferenca)}</strong></article>
          </section>

          <div class="section-title">
            <h2>Resumo por prestador</h2>
            <span>Gerado em ${escapeHtml(formatDateTime(data.geradoEm))}</span>
          </div>

          <table>
            <thead>
              <tr>
                <th>Prestador</th>
                <th>CPF/CNPJ</th>
                <th>Lotação</th>
                <th class="num">Dias</th>
                <th class="num">Salário</th>
                <th class="num">Valor dias</th>
                <th class="num">Adições</th>
                <th class="num">Bônus</th>
                <th class="num">Desc.</th>
                <th class="num">Adiant.</th>
                <th class="num">NF</th>
                <th>N NF</th>
                <th class="num">Líquido</th>
              </tr>
            </thead>
            <tbody>
              ${itens.map((item) => `
                <tr>
                  <td>
                    <strong>${escapeHtml(item.razao_social || item.nome)}</strong>
                    <small>${escapeHtml(item.nome || "")}</small>
                  </td>
                  <td>${escapeHtml(item.cnpj || item.cpf || "")}</td>
                  <td>
                    ${escapeHtml(item.unidade_nome || "")} | ${escapeHtml(item.departamento || "")}
                    <small>${escapeHtml(item.funcao || "")}${item.projeto ? ` - ${escapeHtml(item.projeto)}` : ""}</small>
                  </td>
                  <td class="num">${escapeHtml(item.dias_trabalhados)}</td>
                  <td class="num">${money(item.salario_contrato || item.salario_base)}</td>
                  <td class="num">${money(item.valor_dias)}</td>
                  <td class="num">${money(item.adicoes)}</td>
                  <td class="num">${money(item.bonus)}</td>
                  <td class="num">${money(item.descontos_manual)}</td>
                  <td class="num">${money(item.desconto_adiantamentos)}</td>
                  <td class="num">${money(item.valor_nf_emitida)}</td>
                  <td>${escapeHtml(item.numero_nf || "")}</td>
                  <td class="num"><strong>${money(item.liquido_pagar)}</strong></td>
                </tr>
              `).join("")}
              <tr class="total-row">
                <td colspan="4">Totais da competência</td>
                <td class="num">${money(totals.salario)}</td>
                <td class="num">${money(totals.valorDias)}</td>
                <td class="num">${money(totals.adicoes)}</td>
                <td class="num">${money(totals.bonus)}</td>
                <td class="num">${money(totals.descontos)}</td>
                <td class="num">${money(totals.adiantamentos)}</td>
                <td class="num">${money(totals.nfEmitida)}</td>
                <td></td>
                <td class="num">${money(totals.liquido)}</td>
              </tr>
            </tbody>
          </table>

          <div class="section-title">
            <h2>Aprovações</h2>
            <span>${escapeHtml(aprovacoes.approved ? "Fluxo completo" : "Fluxo pendente")}</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Aprovador</th>
                <th>E-mail</th>
                <th>Data</th>
                <th>Autenticação</th>
              </tr>
            </thead>
            <tbody>
              ${aprovadores.length ? aprovadores.map((item) => `
                <tr>
                  <td>${escapeHtml(item.nome)}</td>
                  <td>${escapeHtml(item.email)}</td>
                  <td>${escapeHtml(formatDateTime(item.aprovado_em))}</td>
                  <td><strong>${escapeHtml(item.codigo_autenticacao || "")}</strong></td>
                </tr>
              `).join("") : `<tr><td colspan="4">Sem aprovações registradas para esta versão da folha.</td></tr>`}
            </tbody>
          </table>

          <section class="signatures">
            <div class="signature"><span>Responsável financeiro</span></div>
            <div class="signature"><span>Conferência</span></div>
            <div class="signature"><span>Diretoria</span></div>
          </section>
          <p class="note">Relatório gerencial de pagamentos PJ. Os valores de NF e diferenças dependem das informações lançadas na prévia/fechamento da folha.</p>
        `;
      }

      loadReportData()
        .then(renderReport)
        .catch((error) => {
          document.querySelector("#report").textContent = error.message;
        });
    </script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de folha PJ</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #6b7280;
        --line: #d9dee7;
        --paper: #f3f4f6;
        --red: #dc2626;
        --charcoal: #171b22;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Inter, Arial, sans-serif;
      }

      .page {
        max-width: 1240px;
        margin: 24px auto;
        padding: 0 18px 30px;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 12px;
      }

      button {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button.primary {
        border-color: var(--red);
        background: var(--red);
        color: #fff;
      }

      .sheet {
        background: #fff;
        border: 1px solid var(--line);
        overflow: hidden;
      }

      .report-head {
        display: grid;
        grid-template-columns: 220px 1fr 240px;
        gap: 18px;
        align-items: center;
        padding: 18px 22px;
        background: var(--charcoal);
        color: #fff;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand img {
        width: 170px;
        max-height: 48px;
        object-fit: contain;
      }

      .brand small,
      .report-head small {
        color: #cbd5e1;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .report-meta {
        display: grid;
        gap: 5px;
        justify-items: end;
        text-align: right;
      }

      .report-meta strong {
        font-size: 18px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        border-bottom: 1px solid var(--line);
      }

      .summary article {
        padding: 12px 14px;
        border-right: 1px solid var(--line);
      }

      .summary article:last-child {
        border-right: 0;
      }

      .summary span,
      .signature span {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .summary strong {
        display: block;
        margin-top: 5px;
        font-size: 15px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 8px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 15px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      .table-scroll {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .table-scroll table {
        min-width: 840px;
      }

      th,
      td {
        padding: 8px 8px;
        border-top: 1px solid var(--line);
        font-size: 11px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #f8fafc;
        color: #374151;
        font-size: 10px;
        text-transform: uppercase;
      }

      td strong {
        display: block;
      }

      td small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
      }

      .num {
        text-align: right;
        white-space: nowrap;
      }

      .status-tag {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .status-tag.ok {
        background: #dcfce7;
        color: #166534;
      }

      .status-tag.warn {
        background: #fef3c7;
        color: #92400e;
      }

      .status-tag.error {
        background: #fee2e2;
        color: #991b1b;
      }

      .exception-note {
        margin: 0;
        padding: 0 16px 10px;
        color: var(--muted);
        font-size: 11px;
      }

      .total-row td {
        background: #f8fafc;
        font-weight: 900;
      }

      .signatures {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        padding: 34px 22px 22px;
      }

      .signature {
        display: grid;
        gap: 8px;
      }

      .signature::before {
        content: "";
        display: block;
        border-top: 1px solid #9ca3af;
      }

      .note {
        padding: 0 22px 18px;
        color: var(--muted);
        font-size: 11px;
      }

      @media (max-width: 760px) {
        body {
          overflow-x: hidden;
        }

        .page {
          width: 100%;
          margin: 0;
          padding: 10px 10px 22px;
        }

        .toolbar {
          position: sticky;
          top: 0;
          z-index: 3;
          justify-content: flex-start;
          padding: 8px 0;
          margin: 0 0 8px;
          background: var(--paper);
        }

        .toolbar button {
          min-height: 34px;
          padding: 0 10px;
          font-size: 12px;
        }

        .sheet {
          border-radius: 8px;
        }

        .report-head {
          grid-template-columns: 1fr;
          gap: 14px;
          padding: 18px 16px;
        }

        .brand img {
          width: 150px;
        }

        h1 {
          font-size: 22px;
        }

        .report-meta {
          justify-items: start;
          text-align: left;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary article {
          min-height: 68px;
        }

        .section-title {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px 14px 8px;
        }

        .section-title h2 {
          font-size: 17px;
        }

        .table-scroll {
          border-top: 1px solid var(--line);
        }

        th,
        td {
          padding: 9px 8px;
          font-size: 11px;
        }

        .signatures {
          grid-template-columns: 1fr;
          gap: 28px;
          padding: 30px 18px 20px;
        }

        .note {
          padding: 0 18px 18px;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .page {
          max-width: none;
          margin: 0;
          padding: 0;
        }

        .toolbar {
          display: none;
        }

        .sheet {
          border: 0;
          overflow: visible;
        }

        .table-scroll {
          overflow: visible;
        }

        .table-scroll table {
          min-width: 0;
        }

        .report-head {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        th {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="toolbar">
        <button type="button" onclick="window.close()">Fechar</button>
        <button type="button" class="primary" onclick="window.print()">Imprimir / PDF</button>
      </div>
      <section id="report" class="sheet">Carregando relatório...</section>
    </main>

    <script>
      const brl = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" });
      const params = new URLSearchParams(window.location.search);

      function money(value) {
        return brl.format(Number(value || 0));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDateTime(value) {
        return new Intl.DateTimeFormat("pt-BR", {
          dateStyle: "short",
          timeStyle: "short",
        }).format(value ? new Date(value) : new Date());
      }

      function formatCompetencia(competencia) {
        const [year, month] = String(competencia || "").split("-");
        if (!year || !month) return competencia || "";
        return new Intl.DateTimeFormat("pt-BR", { month: "long", year: "numeric", timeZone: "UTC" })
          .format(new Date(Date.UTC(Number(year), Number(month) - 1, 1)));
      }

      function sum(items, field) {
        return items.reduce((total, item) => total + Number(item[field] || 0), 0);
      }

      function nfStatusLabel(status) {
        const labels = {
          validada: "NF validada",
          divergente: "NF divergente",
          erro: "Erro na NF",
          pendente: "NF pendente",
        };
        return labels[status || "pendente"] || status || "NF pendente";
      }

      function paymentException(item) {
        const reasons = [];
        const nfStatus = item.nf_status || "pendente";
        const numeroNf = item.numero_nf || item.nf_numero || "";
        const valorNf = Number(item.valor_nf_emitida || item.nf_valor || 0);
        const totalPagar = Number(item.liquido_pagar || 0);
        const diferenca = Number(item.diferenca_nf || 0);

        if (nfStatus !== "validada") reasons.push(nfStatusLabel(nfStatus));
        if (!numeroNf) reasons.push("Número da NF não informado");
        if (valorNf <= 0) reasons.push("Valor da NF não informado");
        if (Math.abs(diferenca) > 0.01) reasons.push(`Diferença de NF ${money(diferenca)}`);
        if (totalPagar <= 0) reasons.push("Total a pagar zerado");

        return reasons.length ? {
          prestador: item.razao_social || item.nome || "",
          nome: item.nome || "",
          cnpj: item.cnpj || item.cpf || "",
          categoria: item.categoria || "",
          nfStatus,
          numeroNf,
          valorNf,
          totalPagar,
          motivo: [...new Set(reasons)].join("; "),
        } : null;
      }

      function subtotalKey(value) {
        return String(value || "Sem categoria").trim() || "Sem categoria";
      }

      function subtotalRows(items, groupFn) {
        const grouped = new Map();
        for (const item of items) {
          const key = groupFn(item);
          const current = grouped.get(key) || {
            label: key,
            pessoas: 0,
            valorDias: 0,
            adicoes: 0,
            bonus: 0,
            descontos: 0,
            adiantamentos: 0,
            nfEmitida: 0,
            liquido: 0,
            diferenca: 0,
          };
          current.pessoas += 1;
          current.valorDias += Number(item.valor_dias || 0);
          current.adicoes += Number(item.adicoes || 0);
          current.bonus += Number(item.bonus || 0);
          current.descontos += Number(item.descontos_manual || 0);
          current.adiantamentos += Number(item.desconto_adiantamentos || 0);
          current.nfEmitida += Number(item.valor_nf_emitida || 0);
          current.liquido += Number(item.liquido_pagar || 0);
          current.diferenca += Number(item.diferenca_nf || 0);
          grouped.set(key, current);
        }
        return [...grouped.values()].sort((a, b) => a.label.localeCompare(b.label, "pt-BR", { sensitivity: "base" }));
      }

      function renderSubtotalTable(title, rows) {
        return `
          <div class="section-title">
            <h2>${escapeHtml(title)}</h2>
            <span>${rows.length} grupo(s)</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Grupo</th>
                <th class="num">Pessoas</th>
                <th class="num">Valor dias</th>
                <th class="num">Adições</th>
                <th class="num">Bônus</th>
                <th class="num">Desc.</th>
                <th class="num">Adiant.</th>
                <th class="num">NF</th>
                <th class="num">Líquido</th>
                <th class="num">Dif. NF</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td><strong>${escapeHtml(row.label)}</strong></td>
                  <td class="num">${row.pessoas}</td>
                  <td class="num">${money(row.valorDias)}</td>
                  <td class="num">${money(row.adicoes)}</td>
                  <td class="num">${money(row.bonus)}</td>
                  <td class="num">${money(row.descontos)}</td>
                  <td class="num">${money(row.adiantamentos)}</td>
                  <td class="num">${money(row.nfEmitida)}</td>
                  <td class="num"><strong>${money(row.liquido)}</strong></td>
                  <td class="num">${money(row.diferenca)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      function makeTablesScrollable() {
        document.querySelectorAll("#report > table").forEach((table) => {
          if (table.parentElement?.classList.contains("table-scroll")) return;
          const wrapper = document.createElement("div");
          wrapper.className = "table-scroll";
          table.parentNode.insertBefore(wrapper, table);
          wrapper.appendChild(table);
        });
      }

      async function loadReportData() {
        const key = params.get("key");
        const stored = key ? sessionStorage.getItem(key) : null;
        if (stored) return JSON.parse(stored);

        const competencia = params.get("competencia");
        if (!competencia) throw new Error("Competência não informada.");
        const response = await fetch(`/api/folhas/${encodeURIComponent(competencia)}`);
        if (!response.ok) throw new Error("Não foi possível carregar a folha.");
        const data = await response.json();
        return { folha: data.folha, itens: data.itens, aprovacoes: data.aprovacoes, lotes: data.lotes || [], geradoEm: new Date().toISOString() };
      }

      function renderReport(data) {
        const folha = data.folha || {};
        const itens = data.itens || [];
        const totals = {
          salario: sum(itens, "salario_contrato"),
          valorDias: sum(itens, "valor_dias"),
          adicoes: sum(itens, "adicoes"),
          bonus: sum(itens, "bonus"),
          descontos: sum(itens, "descontos_manual"),
          adiantamentos: sum(itens, "desconto_adiantamentos"),
          nfEmitida: sum(itens, "valor_nf_emitida"),
          liquido: sum(itens, "liquido_pagar"),
          diferenca: sum(itens, "diferenca_nf"),
        };
        const proventos = totals.valorDias + totals.adicoes + totals.bonus;
        const descontos = totals.descontos + totals.adiantamentos;
        const aprovacoes = data.aprovacoes || folha.aprovacoes || {};
        const fluxoAprovacao = (aprovacoes.fluxo || []).length
          ? aprovacoes.fluxo
          : (aprovacoes.aprovadores || []);
        const lotes = data.lotes || [];
        const excecoesPagamento = itens.map(paymentException).filter(Boolean);
        const aptosPagamento = itens.length - excecoesPagamento.length;
        const exceptionIds = new Set(excecoesPagamento.map((item) => `${item.cnpj}|${item.prestador}`));
        const subtotalCategoria = subtotalRows(itens, (item) => subtotalKey(item.categoria));
        const subtotalSituacao = subtotalRows(itens, (item) => {
          const key = `${item.cnpj || item.cpf || ""}|${item.razao_social || item.nome || ""}`;
          return exceptionIds.has(key) ? "Fora do pagamento no prazo" : "Apto para pagamento";
        });

        document.title = `Relatório folha PJ - ${folha.competencia || ""}`;
        document.querySelector("#report").innerHTML = `
          <header class="report-head">
            <div class="brand">
              <img src="/assets/logo-redefrete-branco.png" alt="Redefrete" />
              <small>Redefrete Logística</small>
            </div>
            <div>
              <small>Demonstrativo de folha PJ</small>
              <h1>Folha de pagamento</h1>
            </div>
            <div class="report-meta">
              <small>Competência</small>
              <strong>${escapeHtml(formatCompetencia(folha.competencia))}</strong>
              <span>${escapeHtml(folha.status === "fechada" ? "Fechada" : "Aberta")}</span>
            </div>
          </header>

          <section class="summary">
            <article><span>Prestadores</span><strong>${itens.length}</strong></article>
            <article><span>R$ Contrato</span><strong>${money(totals.salario)}</strong></article>
            <article><span>Proventos</span><strong>${money(proventos)}</strong></article>
            <article><span>Descontos</span><strong>${money(descontos)}</strong></article>
            <article><span>Total líquido</span><strong>${money(totals.liquido)}</strong></article>
            <article><span>Dif. NF</span><strong>${money(totals.diferenca)}</strong></article>
          </section>

          <div class="section-title">
            <h2>Lotes de pagamento</h2>
            <span>${lotes.length} lote(s) registrado(s)</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Lote</th>
                <th>Status</th>
                <th class="num">Itens</th>
                <th class="num">Total</th>
                <th>Criado em</th>
                <th>Fechado em</th>
                <th>Integrado em</th>
              </tr>
            </thead>
            <tbody>
              ${lotes.length ? lotes.map((lote) => `
                <tr>
                  <td><strong>${escapeHtml(lote.label || `Lote ${lote.numero}`)}</strong></td>
                  <td>${escapeHtml(({ em_aprovacao: "Em aprovação", reprovado: "Reprovado", fechado: "Fechado", integrado_omie: "Integrado Omie" })[lote.status] || lote.status || "")}</td>
                  <td class="num">${Number(lote.itens || 0)}</td>
                  <td class="num">${money(lote.total)}</td>
                  <td>${lote.criado_em ? escapeHtml(formatDateTime(lote.criado_em)) : "-"}</td>
                  <td>${lote.fechado_em ? escapeHtml(formatDateTime(lote.fechado_em)) : "-"}</td>
                  <td>${lote.integrado_em ? escapeHtml(formatDateTime(lote.integrado_em)) : "-"}</td>
                </tr>
              `).join("") : `<tr><td colspan="7">Nenhum lote de pagamento registrado para esta competência.</td></tr>`}
            </tbody>
          </table>

          <div class="section-title">
            <h2>Status de pagamento no prazo</h2>
            <span>${aptosPagamento} apto(s) | ${excecoesPagamento.length} fora do prazo</span>
          </div>
          <p class="exception-note">Prestadores listados abaixo possuem pendência que impede o pagamento no fluxo normal da competência.</p>
          <table>
            <thead>
              <tr>
                <th>Prestador</th>
                <th>CPF/CNPJ</th>
                <th>Categoria</th>
                <th>Status NF</th>
                <th>N NF</th>
                <th class="num">Valor NF</th>
                <th class="num">Total a pagar</th>
                <th>Motivo</th>
              </tr>
            </thead>
            <tbody>
              ${excecoesPagamento.length ? excecoesPagamento.map((item) => `
                <tr>
                  <td><strong>${escapeHtml(item.prestador)}</strong><small>${escapeHtml(item.nome)}</small></td>
                  <td>${escapeHtml(item.cnpj)}</td>
                  <td>${escapeHtml(item.categoria || "-")}</td>
                  <td><span class="status-tag ${item.nfStatus === "validada" ? "ok" : item.nfStatus === "divergente" ? "warn" : "error"}">${escapeHtml(nfStatusLabel(item.nfStatus))}</span></td>
                  <td>${escapeHtml(item.numeroNf || "-")}</td>
                  <td class="num">${money(item.valorNf)}</td>
                  <td class="num">${money(item.totalPagar)}</td>
                  <td>${escapeHtml(item.motivo)}</td>
                </tr>
              `).join("") : `<tr><td colspan="8">Nenhum prestador fora do fluxo normal de pagamento.</td></tr>`}
            </tbody>
          </table>

          ${renderSubtotalTable("Subtotais por categoria", subtotalCategoria)}
          ${renderSubtotalTable("Subtotais por situação de pagamento", subtotalSituacao)}

          <div class="section-title">
            <h2>Resumo por prestador</h2>
            <span>Gerado em ${escapeHtml(formatDateTime(data.geradoEm))}</span>
          </div>

          <table>
            <thead>
              <tr>
                <th>Prestador</th>
                <th>CPF/CNPJ</th>
                <th>Lotação</th>
                <th class="num">Dias</th>
                <th class="num">R$ Contrato</th>
                <th class="num">Valor dias</th>
                <th class="num">Adições</th>
                <th class="num">Bônus</th>
                <th class="num">Desc.</th>
                <th class="num">Adiant.</th>
                <th class="num">NF</th>
                <th>N NF</th>
                <th class="num">Líquido</th>
              </tr>
            </thead>
            <tbody>
              ${itens.map((item) => `
                <tr>
                  <td>
                    <strong>${escapeHtml(item.razao_social || item.nome)}</strong>
                    <small>${escapeHtml(item.nome || "")}</small>
                  </td>
                  <td>${escapeHtml(item.cnpj || item.cpf || "")}</td>
                  <td>
                    ${escapeHtml(item.unidade_nome || "")} | ${escapeHtml(item.departamento || "")}
                    <small>${escapeHtml(item.funcao || "")}${item.projeto ? ` - ${escapeHtml(item.projeto)}` : ""}</small>
                  </td>
                  <td class="num">${escapeHtml(item.dias_trabalhados)}</td>
                  <td class="num">${money(item.salario_contrato || item.salario_base)}</td>
                  <td class="num">${money(item.valor_dias)}</td>
                  <td class="num">${money(item.adicoes)}</td>
                  <td class="num">${money(item.bonus)}</td>
                  <td class="num">${money(item.descontos_manual)}</td>
                  <td class="num">${money(item.desconto_adiantamentos)}</td>
                  <td class="num">${money(item.valor_nf_emitida)}</td>
                  <td>${escapeHtml(item.numero_nf || "")}</td>
                  <td class="num"><strong>${money(item.liquido_pagar)}</strong></td>
                </tr>
              `).join("")}
              <tr class="total-row">
                <td colspan="4">Totais da competência</td>
                <td class="num">${money(totals.salario)}</td>
                <td class="num">${money(totals.valorDias)}</td>
                <td class="num">${money(totals.adicoes)}</td>
                <td class="num">${money(totals.bonus)}</td>
                <td class="num">${money(totals.descontos)}</td>
                <td class="num">${money(totals.adiantamentos)}</td>
                <td class="num">${money(totals.nfEmitida)}</td>
                <td></td>
                <td class="num">${money(totals.liquido)}</td>
              </tr>
            </tbody>
          </table>

          <div class="section-title">
            <h2>Aprovações</h2>
            <span>${escapeHtml(aprovacoes.approved ? "Fluxo completo" : "Fluxo pendente")}</span>
          </div>
          <table>
            <thead>
              <tr>
                <th>Aprovador</th>
                <th>E-mail</th>
                <th>Data</th>
                <th>Autenticação</th>
              </tr>
            </thead>
            <tbody>
              ${fluxoAprovacao.length ? fluxoAprovacao.map((item) => `
                <tr>
                  <td>${escapeHtml(item.nome)}</td>
                  <td>${escapeHtml(item.email)}</td>
                  <td>${item.aprovado_em ? escapeHtml(formatDateTime(item.aprovado_em)) : escapeHtml(item.status === "agora" ? "Aguardando agora" : "Pendente")}</td>
                  <td><strong>${escapeHtml(item.codigo_autenticacao || item.status || "")}</strong></td>
                </tr>
              `).join("") : `<tr><td colspan="4">Sem aprovações registradas para esta versão da folha.</td></tr>`}
            </tbody>
          </table>

          <section class="signatures">
            <div class="signature"><span>Responsável financeiro</span></div>
            <div class="signature"><span>Conferência</span></div>
            <div class="signature"><span>Diretoria</span></div>
          </section>
          <p class="note">Relatório gerencial de pagamentos PJ. Os valores de NF e diferenças dependem das informações lançadas na prévia/fechamento da folha.</p>
        `;
        makeTablesScrollable();
      }

      loadReportData()
        .then(renderReport)
        .catch((error) => {
          document.querySelector("#report").textContent = error.message;
        });
    </script>
  </body>
</html>
